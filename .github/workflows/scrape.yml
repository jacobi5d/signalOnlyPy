name: Automated Action Network Extraction Pipeline

on:
  schedule:
    # Executes every 4 hours to capture continuous market movement
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  extract_data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v5

      - name: Initialize Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python Dependencies and Browser Binaries
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Execute Extraction Script
        env:
          ACTION_EMAIL: ${{ secrets.ACTION_EMAIL }}
          ACTION_PASSWORD: ${{ secrets.ACTION_PASSWORD }}
        run: |
          python scraper.py
      - name: Upload Extracted Artifacts 
        uses: actions/upload-artifact@v4
        with:
          name: sports-analytics-data
          path: |
            signals_data.csv
            signals_data.json
            injury_data.csv
            injury_data.json
